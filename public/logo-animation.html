<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bioloom · Logo motion v2</title>
<style>
  :root{
    --bg:#f6f4ef;
    --card:#ffffff;
    --ink:#1a1a17;
    --muted:#8b8780;
    --line:#e7e3da;
    --stage-a:#fbfaf6;
    --stage-b:#efece4;
    --brand:#10b981;
    --brand-soft:#a7f3d0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
  body{
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .page{max-width:1480px;margin:0 auto;padding:56px 40px 96px}
  header{
    display:flex;justify-content:flex-end;align-items:center;
    margin-bottom:24px;
  }
  .eyebrow{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-bottom:14px;
  }
  h1{
    font-size:34px;font-weight:500;letter-spacing:-0.015em;line-height:1.1;
    margin:0;max-width:680px;
  }
  .lede{color:var(--muted);font-size:14px;margin-top:14px;max-width:560px;line-height:1.55}
  .replay{
    background:var(--ink);color:#fff;border:none;
    padding:11px 20px 12px;border-radius:999px;
    font:500 13px/1 "Helvetica Neue",Helvetica,Arial,sans-serif;
    cursor:pointer;display:inline-flex;align-items:center;gap:8px;
    transition:transform .15s ease, background .15s ease;
  }
  .replay:hover{background:#000;transform:translateY(-1px)}
  .replay::before{
    content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--brand);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
    gap:18px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 30px -18px rgba(20,20,15,.18)}

  .stage{
    position:relative;
    aspect-ratio:16 / 9;
    display:grid;place-items:center;
    padding:30px 40px;
    background:radial-gradient(120% 80% at 50% 0%, var(--stage-a) 0%, var(--stage-b) 100%);
    overflow:hidden;
    isolation:isolate;
    perspective:1200px;
  }
  .stage .logo{
    width:82%;
    height:auto;
    display:block;
    overflow:visible;
  }

  .meta{
    padding:14px 18px 16px;
    border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:flex-end;gap:14px;
  }
  .meta .name{font-size:14px;font-weight:500;letter-spacing:-0.005em}
  .meta .desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45}
  .meta .num{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:10.5px;letter-spacing:.1em;color:var(--muted);
    padding-top:2px;white-space:nowrap;
  }

  /* ---------- transform-origins per part ---------- */
  .g-fabric,
  .g-plant,
  .g-people,
  .g-text{
    transform-box:fill-box;
  }
  .g-plant   { transform-origin:50% 100%; }   /* grow from its base */
  .g-fabric  { transform-origin:50% 100%; }   /* lay down from base */
  .g-people  { transform-origin:50% 100%; }   /* pop standing up */
  .g-text    { transform-origin:0% 50%;  }    /* enter from left */

  /* hidden-by-default helpers (so parts don't show before play kicks in) */
  .logo.armed .g-fabric,
  .logo.armed .g-plant,
  .logo.armed .g-people,
  .logo.armed .g-text{
    opacity:0;
  }
  .logo.armed.shimmer-only .g-fabric,
  .logo.armed.shimmer-only .g-plant,
  .logo.armed.shimmer-only .g-people,
  .logo.armed.shimmer-only .g-text{ opacity:1 }

  /* ============================================================
     01 — Stack build
     fabric wipes in, plant grows, people pop, wordmark fades
     ============================================================ */
  .anim-stack.play .g-fabric { animation: fabricWipe .7s cubic-bezier(.77,0,.18,1) .05s both; }
  .anim-stack.play .g-plant  { animation: plantGrow  .9s cubic-bezier(.34,1.3,.4,1) .55s both; }
  .anim-stack.play .g-people { animation: peoplePop  .55s cubic-bezier(.34,1.56,.64,1) 1.15s both; }
  .anim-stack.play .g-text   { animation: textFade   .7s cubic-bezier(.22,.61,.36,1) 1.45s both; }

  @keyframes fabricWipe{
    0%{opacity:0;clip-path:inset(0 100% 0 0)}
    1%{opacity:1}
    100%{opacity:1;clip-path:inset(0 0 0 0)}
  }
  @keyframes plantGrow{
    0%{opacity:0;transform:scaleY(.05) scaleX(.7)}
    60%{opacity:1}
    100%{opacity:1;transform:scaleY(1) scaleX(1)}
  }
  @keyframes peoplePop{
    0%{opacity:0;transform:scale(.5)}
    60%{opacity:1}
    100%{opacity:1;transform:scale(1)}
  }
  @keyframes textFade{
    0%{opacity:0;transform:translateY(6px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* ============================================================
     02 — Plant first
     plant rises tall, then fabric appears, then people, then text
     ============================================================ */
  .anim-plantfirst.play .g-plant  { animation: plantTall    1.0s cubic-bezier(.34,1.2,.32,1) .0s both; }
  .anim-plantfirst.play .g-fabric { animation: fabricFadeIn .55s cubic-bezier(.22,.61,.36,1) .55s both; }
  .anim-plantfirst.play .g-people { animation: peoplePop    .5s  cubic-bezier(.34,1.56,.64,1) .9s both; }
  .anim-plantfirst.play .g-text   { animation: textWipe     .85s cubic-bezier(.77,0,.18,1) 1.15s both; }
  @keyframes plantTall{
    0%{opacity:0;transform:scaleY(0)}
    50%{opacity:1}
    100%{opacity:1;transform:scaleY(1)}
  }
  @keyframes fabricFadeIn{
    0%{opacity:0;transform:translateY(6px)}
    100%{opacity:1;transform:translateY(0)}
  }
  @keyframes textWipe{
    0%{opacity:0;clip-path:inset(0 100% 0 0)}
    1%{opacity:1}
    100%{opacity:1;clip-path:inset(0 0 0 0)}
  }

  /* ============================================================
     03 — Wordmark types
     icon settles in one beat, letters fade in left→right
     ============================================================ */
  .anim-type.play .g-fabric,
  .anim-type.play .g-plant,
  .anim-type.play .g-people{
    animation: iconSettle .55s cubic-bezier(.22,.61,.36,1) 0s both;
  }
  .anim-type.play .g-text{ opacity:1; } /* keep wrapper visible; per-letter handles it */
  .anim-type .g-text path{ opacity:0; }
  .anim-type.play .g-text path{
    animation: letterIn .42s var(--ld, 600ms) cubic-bezier(.22,.61,.36,1) both;
  }
  @keyframes iconSettle{
    0%{opacity:0;transform:translateY(8px) scale(.97)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes letterIn{
    0%{opacity:0}
    100%{opacity:1}
  }

  /* ============================================================
     04 — Bottom-up cascade
     fabric, people, plant, text rise from below with stagger
     ============================================================ */
  .anim-cascade.play .g-fabric { animation: rise .6s cubic-bezier(.22,.85,.32,1) .0s both; }
  .anim-cascade.play .g-people { animation: rise .6s cubic-bezier(.22,.85,.32,1) .15s both; }
  .anim-cascade.play .g-plant  { animation: rise .75s cubic-bezier(.22,1.2,.32,1) .30s both; }
  .anim-cascade.play .g-text   { animation: rise .6s cubic-bezier(.22,.85,.32,1) .55s both; }
  @keyframes rise{
    0%{opacity:0;transform:translateY(28px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* ============================================================
     05 — Iris from icon center
     whole svg revealed via circle clip-path centered on the icon
     ============================================================ */
  .anim-iris .logo{overflow:visible}
  .anim-iris.play .g-fabric,
  .anim-iris.play .g-plant,
  .anim-iris.play .g-people,
  .anim-iris.play .g-text{ opacity:1 }
  .anim-iris.play .logo{
    animation: irisLogo 1.05s cubic-bezier(.5,0,.2,1) both;
  }
  .anim-iris .logo{ clip-path: circle(0% at 11% 60%); }
  @keyframes irisLogo{
    0%{clip-path:circle(0% at 11% 60%)}
    100%{clip-path:circle(110% at 11% 60%)}
  }

  /* ============================================================
     06 — Wordmark wipe
     icon fades in together; wordmark uncovers L→R
     ============================================================ */
  .anim-wipe.play .g-fabric,
  .anim-wipe.play .g-plant,
  .anim-wipe.play .g-people{
    animation: iconSettle .65s cubic-bezier(.22,.61,.36,1) 0s both;
  }
  .anim-wipe.play .g-text  { animation: textWipe .95s cubic-bezier(.77,0,.18,1) .35s both; }

  /* ============================================================
     07 — Plant sway
     parts fade in together, then plant rocks once on its base
     ============================================================ */
  .anim-sway.play .g-fabric,
  .anim-sway.play .g-people,
  .anim-sway.play .g-text{ animation: gentleFade .55s ease-out 0s both; }
  .anim-sway.play .g-plant{ animation: plantSway 1.7s cubic-bezier(.36,0,.2,1) 0s both; }
  @keyframes gentleFade{
    0%{opacity:0}
    100%{opacity:1}
  }
  @keyframes plantSway{
    0%  {opacity:0;transform:rotate(0deg) translateY(8px)}
    20% {opacity:1;transform:rotate(0deg) translateY(0)}
    45% {opacity:1;transform:rotate(-6deg)}
    70% {opacity:1;transform:rotate(4deg)}
    100%{opacity:1;transform:rotate(0deg)}
  }

  /* ============================================================
     08 — Sticker flop (3D)
     whole logo rotates in like a sign being placed, plant wiggles
     ============================================================ */
  .anim-flop.play .g-fabric,
  .anim-flop.play .g-plant,
  .anim-flop.play .g-people,
  .anim-flop.play .g-text{ opacity:1 }
  .anim-flop .logo{ transform-origin:50% 100%; }
  .anim-flop.play .logo{ animation: flop 1.05s cubic-bezier(.22,1,.3,1) both; }
  .anim-flop.play .g-plant{ animation: wiggle .8s ease-out .9s both; }
  @keyframes flop{
    0%{opacity:0;transform:perspective(900px) rotateX(-65deg) translateY(20px)}
    100%{opacity:1;transform:perspective(900px) rotateX(0) translateY(0)}
  }
  @keyframes wiggle{
    0%  {transform:rotate(0)}
    35% {transform:rotate(-7deg)}
    65% {transform:rotate(5deg)}
    100%{transform:rotate(0)}
  }

  /* ============================================================
     09 — Side meet
     icon enters from left, wordmark from right, they meet
     ============================================================ */
  .anim-meet.play .g-fabric { animation: fromLeft .8s cubic-bezier(.22,.85,.32,1) 0s both; }
  .anim-meet.play .g-plant  { animation: fromLeft .8s cubic-bezier(.22,.85,.32,1) .05s both; }
  .anim-meet.play .g-people { animation: fromLeft .8s cubic-bezier(.22,.85,.32,1) .1s both; }
  .anim-meet.play .g-text   { animation: fromRight .85s cubic-bezier(.22,.85,.32,1) .15s both; }
  @keyframes fromLeft{
    0%{opacity:0;transform:translateX(-40px)}
    60%{opacity:1}
    100%{opacity:1;transform:translateX(0)}
  }
  @keyframes fromRight{
    0%{opacity:0;transform:translateX(40px)}
    60%{opacity:1}
    100%{opacity:1;transform:translateX(0)}
  }

  /* ============================================================
     10 — Bloom
     plant springs with overshoot, people pop one by one,
     fabric lays in last, wordmark scales gently to settle
     ============================================================ */
  .anim-bloom.play .g-plant  { animation: plantSpring 1.0s cubic-bezier(.34,1.7,.32,1) 0s both; }
  .anim-bloom.play .g-fabric { animation: fabricLay .65s cubic-bezier(.22,.85,.32,1) .25s both; }
  .anim-bloom .g-people path{ opacity:0; }
  .anim-bloom.play .g-people{ opacity:1; }
  .anim-bloom.play .g-people path{
    animation: personPop .45s var(--pd, 0ms) cubic-bezier(.34,1.56,.64,1) both;
  }
  .anim-bloom.play .g-text   { animation: textScale .7s cubic-bezier(.34,1.4,.32,1) 1.1s both; }
  @keyframes plantSpring{
    0%  {opacity:0;transform:scale(0)}
    60% {opacity:1;transform:scale(1.08)}
    100%{opacity:1;transform:scale(1)}
  }
  @keyframes fabricLay{
    0%  {opacity:0;transform:scaleY(0)}
    100%{opacity:1;transform:scaleY(1)}
  }
  @keyframes personPop{
    0%  {opacity:0;transform:translateY(6px) scale(.4)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes textScale{
    0%  {opacity:0;transform:scale(.92)}
    100%{opacity:1;transform:scale(1)}
  }

  /* footer */
  footer{
    margin-top:48px;
    color:var(--muted);
    font-size:12px;
    display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;
    padding-top:24px;border-top:1px solid var(--line);
  }
  footer .hint{font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.04em}
</style>
</head>
<body>
<div class="page">
  <header>
    <button class="replay" id="replayBtn">Replay all</button>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <div>10 directions · click a tile to replay</div>
    <div class="hint">space → replay all</div>
  </footer>
</div>

<script>
const tpl = document.getElementById('logoTpl');
let __cloneId = 0;
function logoSVG(){
  const node = tpl.content.firstElementChild.cloneNode(true);
  node.classList.add('logo');
  node.classList.add('armed');
  // uniquify any internal IDs (e.g. clipPath) so multiple clones don't collide
  const uid = '_c' + (++__cloneId);
  node.querySelectorAll('[id]').forEach(el => {
    const oldId = el.id;
    const newId = oldId + uid;
    el.id = newId;
    // rewrite references to the old id
    node.querySelectorAll('[clip-path]').forEach(ref => {
      const v = ref.getAttribute('clip-path');
      if(v && v.includes('#' + oldId)){
        ref.setAttribute('clip-path', v.replace('#' + oldId, '#' + newId));
      }
    });
  });
  return node;
}

const cards = [
  {key:'stack',      name:'Stack build',      desc:'Fabric wipes, plant grows from its base, people pop, wordmark fades.'},
  {key:'plantfirst', name:'Plant first',      desc:'Plant rises before anything else, then the rest catches up.'},
  {key:'type',       name:'Wordmark types',   desc:'Icon settles in one beat. Letters appear left to right.'},
  {key:'cascade',    name:'Bottom-up cascade',desc:'Every part rises from below with stagger — fabric, people, plant, wordmark.'},
  {key:'iris',       name:'Iris from icon',   desc:'Circular reveal opens from the icon outward across the whole mark.'},
  {key:'wipe',       name:'Wordmark wipe',    desc:'Icon settles together. Wordmark uncovers left to right like a curtain.'},
  {key:'sway',       name:'Plant sway',       desc:'Everything fades in fast, then the plant rocks once on its base.'},
  {key:'flop',       name:'Sticker flop',     desc:'Whole mark tilts in 3D and lands. Plant gives a wiggle to settle.'},
  {key:'meet',       name:'Side meet',        desc:'Icon enters from the left, wordmark from the right, meeting in place.'},
  {key:'bloom',      name:'Bloom',            desc:'Plant springs with overshoot, fabric lays, people pop one by one, wordmark scales in.'},
];

const grid = document.getElementById('grid');

cards.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = `card anim-${c.key}`;
  card.dataset.key = c.key;

  const stage = document.createElement('div');
  stage.className = 'stage';

  const svg = logoSVG();
  if(c.key === 'iris') svg.classList.add('shimmer-only'); // iris uses opacity:1 on parts, clip on whole
  stage.appendChild(svg);

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = `
    <div>
      <div class="name">${c.name}</div>
      <div class="desc">${c.desc}</div>
    </div>
    <div class="num">0${i+1} / 10</div>
  `;

  card.appendChild(stage);
  card.appendChild(meta);
  grid.appendChild(card);

  // letter / person delays computed after DOM insertion
  if(c.key === 'type'){
    assignLetterDelays(svg);
  } else if(c.key === 'bloom'){
    assignPersonDelays(svg);
  }

  card.addEventListener('click', () => play(card));
});

function assignLetterDelays(svg){
  const text = svg.querySelector('.g-text');
  if(!text) return;
  const paths = [...text.querySelectorAll('path')];
  // bbox in path-data space — ordering by x matches user-space order (scale x is positive)
  const items = paths.map(p => ({p, x: p.getBBox().x}));
  items.sort((a,b)=>a.x-b.x);
  items.forEach((it, idx) => {
    it.p.style.setProperty('--ld', `${500 + idx * 75}ms`);
  });
}
function assignPersonDelays(svg){
  const people = svg.querySelector('.g-people');
  if(!people) return;
  const paths = [...people.querySelectorAll('path')];
  // pseudo-random but deterministic stagger
  const order = paths.map((_,i) => i);
  // shuffle deterministically
  let seed = 7;
  for(let k=order.length-1;k>0;k--){
    seed = (seed * 9301 + 49297) % 233280;
    const j = seed % (k+1);
    [order[k],order[j]] = [order[j],order[k]];
  }
  paths.forEach((p, i) => {
    const pos = order.indexOf(i);
    p.style.setProperty('--pd', `${500 + pos * 55}ms`);
  });
}

function play(card){
  card.classList.remove('play');
  // force reflow so animations restart
  void card.offsetWidth;
  card.classList.add('play');
}

function playAll(){
  document.querySelectorAll('.card').forEach((card, idx) => {
    card.classList.remove('play');
    void card.offsetWidth;
    setTimeout(() => card.classList.add('play'), idx * 90);
  });
}

document.getElementById('replayBtn').addEventListener('click', playAll);
document.addEventListener('keydown', e => {
  if(e.code === 'Space'){ e.preventDefault(); playAll(); }
});

window.addEventListener('load', () => setTimeout(playAll, 250));
</script>
