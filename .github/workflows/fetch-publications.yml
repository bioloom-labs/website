name: Fetch publications

on:
  schedule:
    # Runs every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch publications
        run: python scripts/fetch_scholar.py

      - name: Commit updated publications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/scholar-publications.json
          if git diff --cached --quiet; then
            echo "No changes to publications, skipping commit."
          else
            git commit -m "chore: update publications from Google Scholar"
            git push
          fi
