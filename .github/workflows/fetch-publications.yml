name: Fetch publications

on:
  schedule:
    # Runs every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install scholarly

      - name: Fetch publications
        run: python scripts/fetch_scholar.py

      - name: Detect publication changes
        id: pubs
        run: |
          if git diff --quiet -- public/scholar-publications.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No publication changes; leaving embeddings as-is."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Publications changed; will regenerate embeddings."
          fi

      # Regenerate the semantic-search embeddings only when the publication list
      # actually changed. These steps are best-effort (continue-on-error): if the
      # model download or build fails, the publication update is still committed
      # and the Publications page falls back to keyword search until the next run.
      - name: Set up Node
        if: steps.pubs.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.pubs.outputs.changed == 'true'
        continue-on-error: true
        run: npm ci

      - name: Regenerate publication embeddings
        if: steps.pubs.outputs.changed == 'true'
        continue-on-error: true
        run: npm run embed-pubs

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/scholar-publications.json public/publications-embeddings.json
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: update publications and semantic embeddings"
            git push
          fi
